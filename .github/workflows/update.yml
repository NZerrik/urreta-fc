name: Actualizar Resultados

on:
  schedule:
    - cron: '0 23 * * 0'
    - cron: '0 23 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Correr scraper
        env:
          IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
          IG_CSRFTOKEN: ${{ secrets.IG_CSRFTOKEN }}
        run: node scripts/scraper.js
      - name: Commit y push si hay cambios
        run: |
          git config user.name "Urreta Bot"
          git config user.email "bot@urreta.fc"
          git add resultados.json
          git diff --staged --quiet || git commit -m "🤖 Resultados actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
